name: Dash Driver iOS TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      SOURCE_REPO: ehteshamawan1/ridego
      COCOAPODS_DISABLE_STATS: "true"
      SOURCE_REPO_PAT: ${{ secrets.SOURCE_REPO_PAT }}
      APP_PATH: source/Files/Main-SourceCode-With-Documentation/Driver Flutter App Full SourceCode
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_BRANCH: ${{ secrets.MATCH_GIT_BRANCH }}
      MATCH_GIT_PAT: ${{ secrets.MATCH_GIT_PAT }}
      MATCH_GIT_USERNAME: ${{ secrets.MATCH_GIT_USERNAME }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          path: source

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Precache Flutter iOS artifacts
        run: flutter precache --ios

      - name: Validate required secrets
        shell: bash
        run: |
          required_vars=(
            SOURCE_REPO_PAT
            APPLE_TEAM_ID
            ASC_KEY_ID
            ASC_ISSUER_ID
            ASC_PRIVATE_KEY
            MATCH_GIT_URL
            MATCH_PASSWORD
          )
          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name}" ]]; then
              echo "Missing required secret: ${var_name}"
              exit 1
            fi
          done
          echo "$ASC_PRIVATE_KEY" | base64 --decode >/dev/null

      - name: Flutter pub get
        working-directory: ${{ env.APP_PATH }}
        run: flutter pub get

      - name: Validate Flutter iOS generated config
        shell: bash
        working-directory: ${{ env.APP_PATH }}
        run: |
          if [ -f ios/Flutter/Generated.xcconfig ]; then
            echo "Generated.xcconfig:"
            cat ios/Flutter/Generated.xcconfig
            if grep -qE '^[A-Z_]+=([A-Za-z]:\\|[A-Za-z]:/)' ios/Flutter/Generated.xcconfig; then
              echo "Windows path detected in ios/Flutter/Generated.xcconfig"
              exit 1
            fi
          fi
          if [ -f ios/Flutter/flutter_export_environment.sh ]; then
            echo "flutter_export_environment.sh:"
            cat ios/Flutter/flutter_export_environment.sh
            if grep -qE '^[^#]*[A-Za-z]:\\' ios/Flutter/flutter_export_environment.sh; then
              echo "Windows path detected in ios/Flutter/flutter_export_environment.sh"
              exit 1
            fi
          fi

      - name: Set up Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ${{ env.APP_PATH }}/ios

      - name: Configure match repo auth
        if: ${{ env.MATCH_GIT_PAT != '' }}
        shell: bash
        run: |
          username="${MATCH_GIT_USERNAME:-x-access-token}"
          git config --global url."https://${username}:${MATCH_GIT_PAT}@github.com/".insteadOf "https://github.com/"

      - name: Fastlane beta
        timeout-minutes: 60
        working-directory: ${{ env.APP_PATH }}/ios
        run: bundle exec fastlane ios beta --verbose

      - name: Collect success artifacts
        if: success()
        shell: bash
        run: |
          mkdir -p success-artifacts
          find ~/Library/Developer/Xcode/Archives -name "*.xcarchive" -type d -print -exec cp -R {} success-artifacts/ \; 2>/dev/null || true
          find "${{ env.APP_PATH }}/ios" -maxdepth 1 \( -name "*.ipa" -o -name "*.pkg" -o -name "*.app" \) -print -exec cp -R {} success-artifacts/ \; 2>/dev/null || true

      - name: Upload success artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dash-driver-ios-build-artifacts
          path: success-artifacts
          if-no-files-found: warn

      - name: Dump build logs on failure
        if: failure()
        shell: bash
        run: |
          echo "Runner temp artifacts:"
          find "$RUNNER_TEMP" -type f \( -name "*.log" -o -name "*.xcresult" \) | head -100 || true
          echo "Gym logs:"
          find ~/Library/Logs/gym -maxdepth 1 -type f -print || true
          if [ -f ~/Library/Logs/gym/Runner-Runner.log ]; then
            echo "Compiler error lines:"
            grep -nE ':[0-9]+:[0-9]+: error:| error: ' ~/Library/Logs/gym/Runner-Runner.log | head -50 || true
            echo "PhaseScriptExecution context:"
            phase_line="$(grep -n 'PhaseScriptExecution Run\\ Script' ~/Library/Logs/gym/Runner-Runner.log | tail -n 1 | cut -d: -f1 || true)"
            if [ -n "$phase_line" ]; then
              start=$((phase_line > 80 ? phase_line - 80 : 1))
              end=$((phase_line + 160))
              sed -n "${start},${end}p" ~/Library/Logs/gym/Runner-Runner.log || true
            fi
            echo "Flutter script reference context:"
            script_line="$(grep -n 'Script-9740EEB61CF901F6004384FC.sh' ~/Library/Logs/gym/Runner-Runner.log | tail -n 1 | cut -d: -f1 || true)"
            if [ -n "$script_line" ]; then
              start=$((script_line > 80 ? script_line - 80 : 1))
              end=$((script_line + 160))
              sed -n "${start},${end}p" ~/Library/Logs/gym/Runner-Runner.log || true
            fi
            echo "Flutter generated script file:"
            script_path="/Users/runner/Library/Developer/Xcode/DerivedData/Runner-dgtfkjivaixgiofjmxkvddtackcf/Build/Intermediates.noindex/ArchiveIntermediates/Runner/IntermediateBuildFilesPath/Runner.build/Release-iphoneos/Runner.build/Script-9740EEB61CF901F6004384FC.sh"
            if [ -n "$script_path" ] && [ -f "$script_path" ]; then
              cat "$script_path" || true
            else
              find /Users/runner/Library/Developer/Xcode/DerivedData -path '*Script-9740EEB61CF901F6004384FC.sh' -print -exec cat {} \; 2>/dev/null || true
            fi
            echo "Flutter tool failure context:"
            flutter_line="$(grep -n 'package:flutter_tools/src/commands/assemble.dart:383:7' ~/Library/Logs/gym/Runner-Runner.log | tail -n 1 | cut -d: -f1 || true)"
            if [ -n "$flutter_line" ]; then
              start=$((flutter_line > 220 ? flutter_line - 220 : 1))
              end=$((flutter_line + 40))
              sed -n "${start},${end}p" ~/Library/Logs/gym/Runner-Runner.log || true
            fi
            echo "Last 250 lines of Runner-Runner.log:"
            tail -250 ~/Library/Logs/gym/Runner-Runner.log || true
          fi

      - name: Collect failure artifacts
        if: failure()
        shell: bash
        run: |
          mkdir -p failure-artifacts
          cp ~/Library/Logs/gym/Runner-Runner.log failure-artifacts/Runner-Runner.log 2>/dev/null || true
          cp /Users/runner/Library/Developer/Xcode/DerivedData/Runner-dgtfkjivaixgiofjmxkvddtackcf/Build/Intermediates.noindex/ArchiveIntermediates/Runner/IntermediateBuildFilesPath/Runner.build/Release-iphoneos/Runner.build/Script-9740EEB61CF901F6004384FC.sh failure-artifacts/Script-9740EEB61CF901F6004384FC.sh 2>/dev/null || true
          find /Users/runner/Library/Developer/Xcode/DerivedData -path '*Script-9740EEB61CF901F6004384FC.sh' -exec cp {} failure-artifacts/ \; 2>/dev/null || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dash-driver-ios-failure-artifacts
          path: failure-artifacts
          if-no-files-found: warn
